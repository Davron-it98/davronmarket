<script>
function checkStrength(val) {
  const fill = document.getElementById('strength-fill');
  const text = document.getElementById('strength-text');
  let score = 0;
  if (val.length >= 6) score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val) || /[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const map = [
    {w:'0%',  c:'#E5E7EB', t:'Введите пароль'},
    {w:'25%', c:'#DC2626', t:'Слабый пароль'},
    {w:'50%', c:'#F59E0B', t:'Средний пароль'},
    {w:'75%', c:'#3B82F6', t:'Хороший пароль'},
    {w:'100%',c:'#16A34A', t:'Надёжный пароль'},
  ];
  const s = map[score] || map[0];
  fill.style.width = s.w;
  fill.style.background = s.c;
  text.textContent = s.t;
  text.style.color = s.c;
}
</script>
