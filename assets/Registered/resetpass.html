<style>
  :root{--brand:#0057FF;--brand-dark:#0040CC;--text:#0A0A0F;--muted:#6B7280;--border:#E5E7EB;--bg:#F8F9FC;--white:#FFFFFF;--error:#DC2626;--error-bg:#FEF2F2;--success:#16A34A;--success-bg:#F0FDF4;--radius:14px;--shadow:0 4px 32px rgba(0,0,0,0.08);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 60% at 70% 30%,rgba(0,87,255,0.07) 0%,transparent 70%);pointer-events:none;}
  .container{width:100%;max-width:420px;animation:fadeUp 0.5s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .logo{text-align:center;margin-bottom:32px;}
  .logo-mark{display:inline-flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-icon{width:44px;height:44px;background:var(--brand);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,87,255,0.35);}
  .logo-icon svg{width:24px;height:24px;fill:white;}
  .logo-name{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.5px;}
  .card{background:var(--white);border-radius:20px;padding:40px 36px;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,0.04);}
  .icon-wrap{width:64px;height:64px;background:#EEF3FF;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
  .icon-wrap svg{width:32px;height:32px;stroke:var(--brand);}
  .card-head{text-align:center;margin-bottom:28px;}
  .card-head h1{font-family:'Sora',sans-serif;font-size:24px;font-weight:700;color:var(--text);letter-spacing:-0.5px;margin-bottom:8px;}
  .card-head p{font-size:14px;color:var(--muted);line-height:1.6;}
  .alert{border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:20px;display:flex;align-items:flex-start;gap:8px;}
  .alert-error{background:var(--error-bg);color:var(--error);border:1px solid #FECACA;}
  .alert svg{width:16px;height:16px;flex-shrink:0;margin-top:1px;}
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:7px;}
  .input-wrap{position:relative;}
  .input-wrap .icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);pointer-events:none;}
  .toggle-pass{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:2px;display:flex;transition:color 0.2s;}
  .toggle-pass:hover{color:var(--brand);}
  .toggle-pass svg{width:16px;height:16px;}
  input[type="password"],input[type="text"]{width:100%;padding:12px 40px 12px 40px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:15px;color:var(--text);background:var(--bg);transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;outline:none;-webkit-appearance:none;}
  input:focus{border-color:var(--brand);background:var(--white);box-shadow:0 0 0 3px rgba(0,87,255,0.12);}
  input::placeholder{color:#B0B7C3;}
  .match-hint{font-size:12px;margin-top:6px;min-height:16px;transition:color 0.2s;}
  .match-ok{color:var(--success);}
  .match-no{color:var(--error);}
  .strength-bar{height:3px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden;}
  .strength-fill{height:100%;width:0%;background:var(--brand);border-radius:2px;transition:width 0.3s,background 0.3s;}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--brand);color:white;border:none;border-radius:var(--radius);font-family:'Sora',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s,transform 0.1s,box-shadow 0.2s;box-shadow:0 4px 14px rgba(0,87,255,0.3);margin-top:8px;}
  .btn:hover{background:var(--brand-dark);box-shadow:0 6px 20px rgba(0,87,255,0.4);}
  .btn:active{transform:scale(0.98);}
  .btn:disabled{background:#B0B7C3;box-shadow:none;cursor:not-allowed;}
  .btn svg{width:16px;height:16px;}
  @media(max-width:480px){.card{padding:28px 20px;}input{font-size:16px;}}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <a href="/" class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/></svg>
      </div>
      <span class="logo-name">DavronMarket</span>
    </a>
  </div>

  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
    </div>
    <div class="card-head">
      <h1>Новый пароль</h1>
      <p>Придумайте надёжный пароль<br/>для вашего аккаунта</p>
    </div>

    <form method="post" id="reset-form">
      <?php wp_nonce_field('dm_resetpass','dm_reset_nonce'); ?>
      <input type="hidden" name="dm_key"   value="<?php echo esc_attr($_GET['key'] ?? ''); ?>"/>
      <input type="hidden" name="dm_login" value="<?php echo esc_attr($_GET['login'] ?? ''); ?>"/>

      <div class="form-group">
        <label>Новый пароль</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" name="dm_pass1" id="pass1" placeholder="Минимум 6 символов" required autocomplete="new-password" oninput="onPassChange()"/>
          <button type="button" class="toggle-pass" onclick="togglePass('pass1',this)" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="sfill"></div></div>
      </div>

      <div class="form-group">
        <label>Повторите пароль</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" name="dm_pass2" id="pass2" placeholder="Повторите пароль" required autocomplete="new-password" oninput="onPassChange()"/>
          <button type="button" class="toggle-pass" onclick="togglePass('pass2',this)" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <p class="match-hint" id="match-hint"></p>
      </div>

      <button type="submit" class="btn" id="submit-btn" disabled>
        Сохранить пароль
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </form>
  </div>
</div>

<script>
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  btn.style.color = isText ? '' : 'var(--brand)';
}
function onPassChange() {
  const p1 = document.getElementById('pass1').value;
  const p2 = document.getElementById('pass2').value;
  const hint = document.getElementById('match-hint');
  const btn = document.getElementById('submit-btn');
  // strength
  let score = 0;
  if(p1.length>=6) score++;
  if(p1.length>=10) score++;
  if(/[A-Z0-9]/.test(p1)) score++;
  if(/[^A-Za-z0-9]/.test(p1)) score++;
  const c = ['#E5E7EB','#DC2626','#F59E0B','#3B82F6','#16A34A'][score];
  const fill = document.getElementById('sfill');
  fill.style.width = (score*25)+'%';
  fill.style.background = c;
  // match
  if(!p2) { hint.textContent=''; btn.disabled=true; return; }
  if(p1===p2 && p1.length>=6) {
    hint.textContent='✓ Пароли совпадают'; hint.className='match-hint match-ok'; btn.disabled=false;
  } else if(p1!==p2) {
    hint.textContent='Пароли не совпадают'; hint.className='match-hint match-no'; btn.disabled=true;
  } else {
    hint.textContent='Минимум 6 символов'; hint.className='match-hint match-no'; btn.disabled=true;
  }
}
</script>
</body>
