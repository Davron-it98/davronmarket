<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DavronMarket — Новости</title>
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('dm_theme')||'dark');</script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/engine.css">
<style>
:root{--bg:#070707;--card:#0e0e0e;--brd:rgba(255,255,255,.07);}
[data-theme="light"]{--bg:#f5f7fb;--card:#fff;--brd:rgba(0,0,0,.08);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Mulish',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}
.news-page{padding:80px 20px 80px;max-width:960px;margin:0 auto;}
/* HERO */
.news-hero{text-align:center;padding:48px 0 56px;}
.news-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 18px;border-radius:40px;background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.22);font-size:12px;font-weight:700;color:#60a5fa;margin-bottom:18px;}
.news-hero h1{font-family:'Unbounded',sans-serif;font-size:clamp(24px,5vw,48px);font-weight:800;margin-bottom:12px;line-height:1.1;color:#fff;}
[data-theme="light"] .news-hero h1{color:#111;}
.news-hero h1 span{background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;}
.news-hero p{font-size:15px;color:rgba(255,255,255,.45);max-width:480px;margin:0 auto;}
[data-theme="light"] .news-hero p{color:rgba(0,0,0,.45);}
/* FILTERS */
.news-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;}
.news-filter{padding:7px 16px;border-radius:20px;border:1px solid var(--brd);background:transparent;color:rgba(255,255,255,.5);font-family:'Mulish',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
[data-theme="light"] .news-filter{color:rgba(0,0,0,.5);}
.news-filter.active,.news-filter:hover{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.3);color:#60a5fa;}
/* FEATURED */
.news-featured{background:var(--card);border:1px solid var(--brd);border-radius:24px;padding:32px;display:flex;gap:28px;align-items:center;margin-bottom:28px;position:relative;overflow:hidden;min-height:200px;}
.news-featured::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,#60a5fa,#a78bfa);}
.feat-emoji{font-size:72px;flex-shrink:0;opacity:.9;}
.feat-body{flex:1;}
.feat-cat{font-size:10px;font-weight:800;color:#60a5fa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.feat-title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:800;color:#fff;margin-bottom:10px;line-height:1.3;}
[data-theme="light"] .feat-title{color:#111;}
.feat-text{font-size:13px;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:16px;}
[data-theme="light"] .feat-text{color:rgba(0,0,0,.45);}
.feat-meta{display:flex;align-items:center;gap:12px;font-size:11px;color:rgba(255,255,255,.3);}
[data-theme="light"] .feat-meta{color:rgba(0,0,0,.3);}
/* NEWS LIST */
.news-list{display:flex;flex-direction:column;gap:14px;}
.news-item{
  background:var(--card);border:1px solid var(--brd);border-radius:18px;
  padding:24px;display:flex;gap:20px;align-items:flex-start;
  transition:all .22s;cursor:pointer;
}
.news-item:hover{border-color:rgba(96,165,250,.25);transform:translateX(4px);}
.ni-emoji{font-size:36px;flex-shrink:0;}
.ni-body{flex:1;}
.ni-cat{font-size:10px;font-weight:800;letter-spacing:.06em;margin-bottom:6px;text-transform:uppercase;}
.ni-title{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:800;color:#fff;margin-bottom:6px;line-height:1.4;}
[data-theme="light"] .ni-title{color:#111;}
.ni-text{font-size:12px;color:rgba(255,255,255,.4);line-height:1.6;}
[data-theme="light"] .ni-text{color:rgba(0,0,0,.4);}
.ni-meta{font-size:10px;color:rgba(255,255,255,.25);margin-top:8px;}
[data-theme="light"] .ni-meta{color:rgba(0,0,0,.25);}
/* ADMIN CTA */
.admin-cta{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.18);border-radius:18px;padding:22px 24px;margin-top:40px;display:flex;align-items:center;gap:16px;justify-content:space-between;flex-wrap:wrap;}
.admin-cta-text{font-size:13px;color:rgba(255,255,255,.55);}
[data-theme="light"] .admin-cta-text{color:rgba(0,0,0,.5);}
.admin-cta-text strong{color:#60a5fa;}
.btn-blue-sm{padding:10px 22px;border-radius:12px;border:none;background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:800;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-blue-sm:hover{transform:translateY(-2px);filter:brightness(1.08);}
@media(max-width:600px){.news-featured{flex-direction:column;gap:14px;}.news-item{flex-direction:column;gap:8px;}.admin-cta{flex-direction:column;}}
</style>
</head>
<body>

<div class="news-page">
  <div class="news-hero">
    <div class="news-badge">📰 Новости</div>
    <h1>Новости <span>DavronMarket</span></h1>
    <p>Последние обновления платформы, новые услуги, акции и анонсы от команды.</p>
  </div>

  <div class="news-filters">
    <button class="news-filter active" data-cat="all">Все новости</button>
    <button class="news-filter" data-cat="platform">🚀 Платформа</button>
    <button class="news-filter" data-cat="shop">🛍 Магазин</button>
    <button class="news-filter" data-cat="services">💼 Услуги</button>
    <button class="news-filter" data-cat="promo">🎁 Акции</button>
    <button class="news-filter" data-cat="courses">🎓 Курсы</button>
  </div>

  <!-- FEATURED NEWS -->
  <div class="news-featured" id="news-featured-auto"></div>

  <!-- NEWS LIST -->
  <div class="news-list" id="newsList"></div>

  <div class="admin-cta">
    <div class="admin-cta-text">
      <strong>Администраторы DavronMarket</strong> добавляют новости и обновления. Если у вас есть предложения или вопросы — напишите нам.
    </div>
    <button class="btn-blue-sm" onclick="contactAdmin()">📩 Написать нам</button>
  </div>
</div>

<script src="assets/js/engine.js"></script>
<script src="assets/js/news-auto.js"></script>
<script>
function contactAdmin() {
  window.open('https://wa.me/992929612111?text=' + encodeURIComponent('📰 Вопрос по новостям DavronMarket: '), '_blank');
}
</script>
</body>
</html>
