<script>
function showSent(e) {
  // Убери эту функцию в реальном WordPress — там редирект серверный
  // Это только для демо HTML
  e.preventDefault();
  const email = document.getElementById('email-input').value;
  document.getElementById('sent-email').textContent = email;
  document.getElementById('form-state').classList.add('hidden');
  document.getElementById('sent-state').classList.add('show');
}
</script>
